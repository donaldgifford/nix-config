[tools]

# ── Runtimes ──────────────────────────────────────────────────────────────────
# renovate: datasource=github-tags depName=golang/go extractVersion=^go(?<version>.+)$
go = "1.26.4"
# renovate: datasource=node-version depName=node
node = "24.14.0"
